name: ITINERA v0.23 definitive refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * 1"

jobs:
  refresh-v022:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenSSL legacy compatibility for official portals
        run: |
          cat > "$RUNNER_TEMP/openssl-legacy.cnf" <<'EOF'
          openssl_conf = openssl_init

          [openssl_init]
          ssl_conf = ssl_sect

          [ssl_sect]
          system_default = system_default_sect

          [system_default_sect]
          Options = UnsafeLegacyRenegotiation
          CipherString = DEFAULT:@SECLEVEL=0
          EOF
          echo "OPENSSL_CONF=$RUNNER_TEMP/openssl-legacy.cnf" >> "$GITHUB_ENV"
          echo "NODE_TLS_REJECT_UNAUTHORIZED=0" >> "$GITHUB_ENV"
          echo "ITINERA_CURL_INSECURE=1" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download difficult official files with legacy TLS curl cache
        continue-on-error: true
        run: |
          mkdir -p tools/official-load/cache
          UA="Mozilla/5.0 (X11; Linux x86_64) ITINERA/0.22.4"
          CURL_BASE=(curl -k -L --http1.1 --retry 3 --retry-delay 2 --compressed --tlsv1.2 --ciphers "DEFAULT:@SECLEVEL=0" -A "$UA")

          "${CURL_BASE[@]}" --referer "https://estadisticas.ciencia.gob.es/jaxiPx/dlgExport.htm" "https://estadisticas.ciencia.gob.es/jaxiPx/files/_px/es/csv_bd/Universitaria/EUCT/2024/Titulaciones/l0/Titulaciones_Grado_Rama_Univ.csv_bd" -o tools/official-load/cache/univbase_grados_2024.csv_bd || true
          "${CURL_BASE[@]}" --referer "https://estadisticas.ciencia.gob.es/jaxiPx/dlgExport.htm" "https://estadisticas.ciencia.gob.es/jaxiPx/files/_px/es/csv_bdsc/Universitaria/EUCT/2024/Titulaciones/l0/Titulaciones_Grado_Rama_Univ.csv_bdsc" -o tools/official-load/cache/univbase_grados_2024.csv_bdsc || true
          "${CURL_BASE[@]}" --referer "https://estadisticas.ciencia.gob.es/jaxiPx/dlgExport.htm" "https://estadisticas.ciencia.gob.es/jaxiPx/files/_px/es/xlsx/Universitaria/EUCT/2024/Titulaciones/l0/Titulaciones_Grado_Rama_Univ.xlsx" -o tools/official-load/cache/univbase_grados_2024.xlsx || true
          "${CURL_BASE[@]}" --referer "https://estadisticas.ciencia.gob.es/jaxiPx/dlgExport.htm" "https://estadisticas.ciencia.gob.es/jaxiPx/files/_px/es/csv_bd/Universitaria/EUCT/2024/Titulaciones/l0/Titulaciones_Master_Rama_Univ.csv_bd" -o tools/official-load/cache/univbase_masteres_2024.csv_bd || true
          "${CURL_BASE[@]}" --referer "https://estadisticas.ciencia.gob.es/jaxiPx/dlgExport.htm" "https://estadisticas.ciencia.gob.es/jaxiPx/files/_px/es/csv_bdsc/Universitaria/EUCT/2024/Titulaciones/l0/Titulaciones_Master_Rama_Univ.csv_bdsc" -o tools/official-load/cache/univbase_masteres_2024.csv_bdsc || true
          "${CURL_BASE[@]}" --referer "https://estadisticas.ciencia.gob.es/jaxiPx/dlgExport.htm" "https://estadisticas.ciencia.gob.es/jaxiPx/files/_px/es/xlsx/Universitaria/EUCT/2024/Titulaciones/l0/Titulaciones_Master_Rama_Univ.xlsx" -o tools/official-load/cache/univbase_masteres_2024.xlsx || true
          "${CURL_BASE[@]}" "https://ciug.gal/PDF/2025/ACCESO/notas_de_corte_2025.pdf" -o tools/official-load/cache/ciug_notas_corte_2025.pdf || true
          "${CURL_BASE[@]}" "https://ciug.gal/PDF/2026/Acceso/ponderacions_2026.pdf" -o tools/official-load/cache/ciug_ponderaciones_2026.pdf || true

          echo "Cache result:"
          ls -lh tools/official-load/cache || true
          echo "Non-empty cached files:"
          find tools/official-load/cache -type f -size +2k -maxdepth 1 -print -exec wc -c {} \; || true

      - name: Run base official importer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: node tools/official-load/import-official-catalogs.mjs

      - name: Run v0.23 definitive importer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: node tools/official-load/import-v022-macrointegral.mjs
