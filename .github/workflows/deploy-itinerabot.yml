name: Deploy ItineraBot Edge Function

on:
  workflow_dispatch:

jobs:
  deploy-itinerabot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set ItineraBot secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ITINERA_OPENAI_MODEL: ${{ secrets.ITINERA_OPENAI_MODEL }}
        run: |
          supabase secrets set \
            --project-ref "$SUPABASE_PROJECT_REF" \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            OPENAI_API_KEY="$OPENAI_API_KEY" \
            ITINERA_OPENAI_MODEL="${ITINERA_OPENAI_MODEL:-gpt-4.1-mini}"

      - name: Deploy ItineraBot
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase functions deploy itinerabot --project-ref "$SUPABASE_PROJECT_REF"
